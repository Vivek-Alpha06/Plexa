name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------ Contracts
  contracts:
    name: Contracts (Rust / Soroban)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Native `cargo test` on Linux builds the cdylib fine — the PE
      # "export ordinal too large" link error is specific to the Windows-GNU
      # toolchain, so no crate-type swap is needed here.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      # Formatting / lint are advisory — they surface issues without blocking
      # the build & test gate below.
      - name: Format check (advisory)
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --workspace --all-targets

      - name: Run unit tests
        run: cargo test --workspace --locked

      - name: Build Wasm artifacts
        run: cargo build --workspace --target wasm32-unknown-unknown --release --locked

      - name: Upload Wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: |
            contracts/target/wasm32-unknown-unknown/release/plexa_group.wasm
            contracts/target/wasm32-unknown-unknown/release/plexa_factory.wasm
          if-no-files-found: warn

  # ------------------------------------------------------------------- Frontend
  frontend:
    name: Frontend (React / Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (lint)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: warn
